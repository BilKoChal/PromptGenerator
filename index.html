<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="icon">⚡</span>Prompt Generator</h1>
            <p class="subtitle">Build structured prompts for AI agents — no AI required</p>
        </div>

        <!-- Role Section -->
        <div class="card" id="roleCard">
            <div class="card-header">
                <span class="section-icon icon-role">🎭</span> AI / Agent Role
            </div>
            <div class="role-row">
                <div class="role-select-wrap">
                    <label for="roleSelect">Select Role</label>
                    <select id="roleSelect">
                        <option value="Senior Software Engineer">Senior Software Engineer</option>
                        <option value="Code Reviewer">Code Reviewer</option>
                        <option value="DevOps Engineer">DevOps Engineer</option>
                        <option value="Security Analyst">Security Analyst</option>
                        <option value="QA Tester">QA Tester</option>
                        <option value="Technical Writer">Technical Writer</option>
                        <option value="Data Scientist">Data Scientist</option>
                        <option value="Product Manager">Product Manager</option>
                        <option value="custom">✨ Custom Role...</option>
                    </select>
                </div>
                <div class="custom-role-wrap" id="customRoleWrap">
                    <label for="customRoleInput">Custom Role</label>
                    <input
                        type="text"
                        id="customRoleInput"
                        class="custom-role-input"
                        placeholder="e.g., Senior React Developer specializing in accessibility..."
                        value=""
                    >
                </div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="card" id="tasksCard">
            <div class="card-header">
                <span class="section-icon icon-tasks">📋</span> Task Steps
                <span style="font-weight:400;font-size:0.8rem;color:var(--text-secondary);margin-left:auto;">
                    Drag to reorder
                </span>
            </div>
            <div class="task-list" id="taskList"></div>
            <button class="btn btn-add" id="btnAddTask" style="margin-top:14px;">
                <span style="font-size:1.3rem;line-height:1;">+</span> Add Task Step
            </button>
        </div>

        <!-- Preview Section -->
        <div class="card" id="previewCard">
            <div class="card-header">
                <span class="section-icon icon-preview">📄</span> Generated Prompt
                <span style="font-weight:400;font-size:0.75rem;color:var(--text-secondary);margin-left:auto;">
                    Markdown
                </span>
            </div>
            <div class="preview-block" id="previewBlock"></div>
            <div class="btn-group">
                <button class="btn btn-copy" id="btnCopy">📋 Copy to Clipboard</button>
                <button class="btn btn-download" id="btnDownload">💾 Download .md</button>
                <button class="btn btn-outline" id="btnReset">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
