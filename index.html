<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Toggle Button -->
    <button id="sidebarToggle" class="sidebar-toggle" title="Saved Workflows">☰</button>

    <!-- Sidebar Panel -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>💾 Saved Workflows</h2>
            <button id="sidebarClose" class="btn-icon" title="Close">✕</button>
        </div>
        <div class="sidebar-body">
            <div class="save-section">
                <input type="text" id="workflowName" placeholder="Workflow name..." class="sidebar-input">
                <button id="btnSaveWorkflow" class="btn btn-save">💾 Save Current</button>
            </div>
            <div class="workflow-list" id="workflowList"></div>
            <div class="sidebar-footer">
                <button id="btnExportAll" class="btn btn-outline-small">📤 Export All</button>
                <button id="btnImportFile" class="btn btn-outline-small">📥 Import File</button>
                <input type="file" id="importFileInput" accept=".json" hidden>
            </div>
        </div>
    </aside>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="icon">⚡</span>Prompt Generator</h1>
            <p class="subtitle">Build structured prompts for AI agents — no AI required</p>
        </div>

        <!-- Role Section -->
        <div class="card" id="roleCard">
            <div class="card-header">
                <span class="section-icon icon-role">🎭</span> AI / Agent Role
            </div>
            <div class="role-row">
                <div class="role-select-wrap">
                    <label for="roleSelect">Select Role</label>
                    <select id="roleSelect">
                        <option value="Senior Software Engineer (full-stack, React/Node.js, writes production-grade code)">Senior Software Engineer (full-stack, React/Node.js, writes production-grade code)</option>
                        <option value="Code Reviewer (meticulous, checks security, performance & readability)">Code Reviewer (meticulous, checks security, performance & readability)</option>
                        <option value="DevOps Engineer (CI/CD, Docker, AWS, infrastructure-as-code)">DevOps Engineer (CI/CD, Docker, AWS, infrastructure-as-code)</option>
                        <option value="Security Analyst (finds vulnerabilities, OWASP top 10, threat modeling)">Security Analyst (finds vulnerabilities, OWASP top 10, threat modeling)</option>
                        <option value="QA Tester (automated testing, edge cases, regression suites)">QA Tester (automated testing, edge cases, regression suites)</option>
                        <option value="Technical Writer (clear docs, tutorials, API references)">Technical Writer (clear docs, tutorials, API references)</option>
                        <option value="Data Scientist (ML pipelines, data cleaning, model evaluation)">Data Scientist (ML pipelines, data cleaning, model evaluation)</option>
                        <option value="Product Manager (user stories, roadmapping, prioritization)">Product Manager (user stories, roadmapping, prioritization)</option>
                        <option value="custom">✨ Custom Role...</option>
                    </select>
                </div>
                <div class="custom-role-wrap" id="customRoleWrap">
                    <label for="customRoleInput">Custom Role</label>
                    <input type="text" id="customRoleInput" class="custom-role-input" placeholder="e.g., Senior React Developer specializing in accessibility...">
                </div>
            </div>
            <div class="role-checkboxes">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkAgentic"> Agentic (you can perform agentic tasks)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkSubagent"> Subagent (you can call sub‑agents)
                </label>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="card" id="tasksCard">
            <div class="card-header">
                <span class="section-icon icon-tasks">📋</span> Task Steps
                <span class="drag-hint">Drag via ⋮⋮ handle to reorder</span>
            </div>
            <div class="task-list" id="taskList"></div>
            <button class="btn btn-add" id="btnAddTask">
                <span class="plus-icon">+</span> Add Task Step
            </button>
        </div>

        <!-- Preview Section -->
        <div class="card" id="previewCard">
            <div class="card-header">
                <span class="section-icon icon-preview">📄</span> Generated Prompt
                <span class="file-type-badge">Markdown</span>
            </div>
            <div class="preview-block" id="previewBlock"></div>
            <div class="btn-group">
                <button class="btn btn-copy" id="btnCopy">📋 Copy to Clipboard</button>
                <button class="btn btn-download" id="btnDownload">💾 Download .md</button>
                <button class="btn btn-outline" id="btnReset">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
